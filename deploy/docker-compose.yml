# ============================================================
# AttendEase — per-customer deployment (Option A tenancy)
# One copy of this stack = one customer. Fully isolated DB.
#
#   1. python generate_env.py      (creates .env with fresh secrets)
#   2. docker compose up -d --build
#   3. Open http://<server-ip>:5000/health  → should say "ok"
# ============================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: attendease
      POSTGRES_USER: attendease
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendease -d attendease"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://attendease:${POSTGRES_PASSWORD}@db:5432/attendease
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CAMERA_API_KEY: ${CAMERA_API_KEY}       # RFID reader key (unique per customer)
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SEED_ADMIN: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      RATELIMIT_STORAGE_URI: memory://
      LOG_LEVEL: INFO
    volumes:
      - uploads:/app/uploads

volumes:
  db_data:
  uploads:
