<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#081020"/>

  <!-- Gold dot + stem -->
  <line x1="34" y1="16" x2="34" y2="22" stroke="#C8922A" stroke-width="2"/>
  <circle cx="34" cy="12" r="4.5" fill="#C8922A"/>

  <!-- Eye outline -->
  <path d="M4 36 Q32 20 60 36 Q32 52 4 36 Z"
        fill="#081020" stroke="#29A8E8" stroke-width="3"/>

  <!-- Left connector line + dot -->
  <line x1="4" y1="36" x2="2" y2="42" stroke="#2A3A6A" stroke-width="1.5"/>
  <circle cx="2" cy="43" r="2" fill="#2A3A6A"/>

  <!-- Right connector line + dot -->
  <line x1="60" y1="36" x2="62" y2="30" stroke="#2A3A6A" stroke-width="1.5"/>
  <circle cx="62" cy="29" r="2" fill="#2A3A6A"/>

  <!-- Outer iris ring (blue dots at cardinal points) -->
  <circle cx="32" cy="36" r="10" fill="none" stroke="#1A2A5A" stroke-width="1" stroke-dasharray="2 2"/>
  <circle cx="32" cy="26" r="2.2" fill="#29A8E8"/>
  <circle cx="32" cy="46" r="2.2" fill="#29A8E8"/>
  <circle cx="22" cy="36" r="2.2" fill="#2A3A6A"/>
  <circle cx="42" cy="36" r="2.2" fill="#2A3A6A"/>

  <!-- Inner hexagon lines -->
  <line x1="32" y1="26" x2="22" y2="36" stroke="#1A2A5A" stroke-width="1"/>
  <line x1="32" y1="26" x2="42" y2="36" stroke="#1A2A5A" stroke-width="1"/>
  <line x1="22" y1="36" x2="32" y2="46" stroke="#1A2A5A" stroke-width="1"/>
  <line x1="42" y1="36" x2="32" y2="46" stroke="#1A2A5A" stroke-width="1"/>

  <!-- Iris fill + pupil -->
  <circle cx="32" cy="36" r="6"   fill="#29A8E8"/>
  <circle cx="32" cy="36" r="3.2" fill="#FFFFFF"/>
  <circle cx="32" cy="36" r="1.5" fill="#0A5FAA"/>
</svg>
