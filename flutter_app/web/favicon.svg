<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- AttendEase favicon — eye logo scaled to fill the frame -->
  <rect width="64" height="64" rx="14" fill="#081020"/>
  <!-- gold indicator dot + stem -->
  <line x1="32" y1="19" x2="32" y2="24" stroke="#D4A930" stroke-width="2.5"/>
  <circle cx="32" cy="14" r="5" fill="#D4A930"/>
  <!-- eye outline -->
  <path d="M5 38 Q32 18 59 38 Q32 58 5 38 Z" fill="none"
        stroke="#2FA8E8" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- iris -->
  <circle cx="32" cy="38" r="9"   fill="#29A0E0"/>
  <circle cx="32" cy="38" r="4.8" fill="#FFFFFF"/>
  <circle cx="32" cy="38" r="2.2" fill="#0A66C0"/>
</svg>
