version: '3.9'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: attendease_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-attendease}
      POSTGRES_USER: ${POSTGRES_USER:-attendease_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-StrongPass@2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-attendease_user} -d ${POSTGRES_DB:-attendease}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendease_net

  # ─────────────────────────────────────────────
  # Redis (for rate limiting + caching)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: attendease_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisPass@2024}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - attendease_net

  # ─────────────────────────────────────────────
  # Flask Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: attendease_backend
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-attendease_user}:${POSTGRES_PASSWORD:-StrongPass@2024}@db:5432/${POSTGRES_DB:-attendease}
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisPass@2024}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-super-secret-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret}
      UPLOAD_FOLDER: /app/uploads
      MAX_CONTENT_LENGTH: 16777216   # 16 MB
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - face_models:/app/models
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - attendease_net

  # ─────────────────────────────────────────────
  # Nginx — serves Flutter web + proxies API
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: attendease_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./flutter_app/build/web:/usr/share/nginx/html:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - backend
    networks:
      - attendease_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  face_models:

networks:
  attendease_net:
    driver: bridge
