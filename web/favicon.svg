<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#0b1a2e"/>

  <!-- Gold dot stem -->
  <line x1="256" y1="198" x2="256" y2="108" stroke="#c8a030" stroke-width="3.5"/>
  <!-- Gold ball -->
  <circle cx="256" cy="90" r="22" fill="#d4a83c"/>

  <!-- Left connector: horizontal line + L-down + dot -->
  <line x1="68" y1="288" x2="26" y2="288" stroke="#29c4f0" stroke-width="2.5"/>
  <line x1="26" y1="288" x2="26" y2="318" stroke="#29c4f0" stroke-width="2.5"/>
  <circle cx="26" cy="318" r="6" fill="#29c4f0"/>

  <!-- Right connector: horizontal line + L-up + dot -->
  <line x1="444" y1="288" x2="486" y2="288" stroke="#29c4f0" stroke-width="2.5"/>
  <line x1="486" y1="288" x2="486" y2="260" stroke="#29c4f0" stroke-width="2.5"/>
  <circle cx="486" cy="260" r="6" fill="#29c4f0"/>

  <!-- Eye / lens shape -->
  <path d="M 68,288 Q 256,170 444,288 Q 256,406 68,288 Z"
        fill="none" stroke="#29c4f0" stroke-width="3.5"/>

  <!-- Small dot at left eye tip -->
  <circle cx="68" cy="288" r="5" fill="#29c4f0"/>

  <!-- Dashed concentric circles inside eye -->
  <circle cx="256" cy="288" r="90" fill="none" stroke="#1b3660" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="256" cy="288" r="68" fill="none" stroke="#1b3660" stroke-width="1.5" stroke-dasharray="4,5"/>
  <circle cx="256" cy="288" r="48" fill="none" stroke="#1b3660" stroke-width="1.5" stroke-dasharray="3,4"/>

  <!-- Hexagon spokes (flat-top, radius 70) -->
  <!-- Top     (256, 218) -->
  <!-- TR      (256+70*sin60, 288-70*cos60) = (256+60.6, 288-35) = (317, 253) -->
  <!-- BR      (317, 323) -->
  <!-- Bottom  (256, 358) -->
  <!-- BL      (195, 323) -->
  <!-- TL      (195, 253) -->
  <line x1="256" y1="288" x2="256" y2="218" stroke="#1e4c8a" stroke-width="2"/>
  <line x1="256" y1="288" x2="317" y2="253" stroke="#1e4c8a" stroke-width="2"/>
  <line x1="256" y1="288" x2="317" y2="323" stroke="#1e4c8a" stroke-width="2"/>
  <line x1="256" y1="288" x2="256" y2="358" stroke="#1e4c8a" stroke-width="2"/>
  <line x1="256" y1="288" x2="195" y2="323" stroke="#1e4c8a" stroke-width="2"/>
  <line x1="256" y1="288" x2="195" y2="253" stroke="#1e4c8a" stroke-width="2"/>

  <!-- Hexagon vertex dots -->
  <circle cx="256" cy="218" r="7" fill="#3d7fc1"/>
  <circle cx="317" cy="253" r="7" fill="#3d7fc1"/>
  <circle cx="317" cy="323" r="7" fill="#3d7fc1"/>
  <circle cx="256" cy="358" r="7" fill="#3d7fc1"/>
  <circle cx="195" cy="323" r="7" fill="#3d7fc1"/>
  <circle cx="195" cy="253" r="7" fill="#3d7fc1"/>

  <!-- Outer ring around center -->
  <circle cx="256" cy="288" r="30" fill="none" stroke="#2460a8" stroke-width="2.5"/>

  <!-- White pupil circle -->
  <circle cx="256" cy="288" r="19" fill="white"/>

  <!-- Cyan center dot -->
  <circle cx="256" cy="288" r="7.5" fill="#29c4f0"/>
</svg>
