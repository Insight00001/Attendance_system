# Render Blueprint — deploy the AttendEase backend with one click.
# In Render: New → Blueprint → connect this repo.
services:
  - type: web
    name: attendease-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: DATABASE_URL
        sync: false          # paste your Supabase pooler URL in the dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false          # e.g. https://your-app.vercel.app
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
